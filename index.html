<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Assinaturas Pro</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-color: #ffffff;
            --text-color: #333;
            --primary-color: #4a90e2;
            --hoje-color: #ff9800;
            --vencido-color: #e74c3c;
            --normal-color: #2ecc71;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        h1, h2 {
            color: #2c3e50;
            margin: 10px 0;
        }

        /* Área de Backup e Importação */
        .backup-controls {
            display: flex;
            gap: 10px;
        }

        .btn-backup { background-color: #7f8c8d; }
        .btn-backup:hover { background-color: #616a6b; }
        .btn-import { background-color: #16a085; }
        .btn-import:hover { background-color: #117a65; }
        #input-file { display: none; }

        /* Dashboard */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--card-color);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-left: 5px solid var(--primary-color);
        }

        .card.receber { border-left-color: var(--hoje-color); }
        .card.recebido { border-left-color: var(--normal-color); }
        .card.clientes-qtd { border-left-color: #9b59b6; }

        .card h3 { margin: 0 0 10px 0; font-size: 0.9rem; color: #7f8c8d; text-transform: uppercase; }
        .card p { margin: 0; font-size: 1.8rem; font-weight: bold; }

        /* Formulário */
        .form-section {
            background: var(--card-color);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            align-items: flex-end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label { margin-bottom: 5px; font-weight: 600; font-size: 0.9rem; }
        .form-group input {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
        }

        button {
            color: white;
            border: none;
            padding: 11px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: background 0.2s;
        }

        .btn-salvar { background-color: var(--primary-color); }
        .btn-salvar:hover { background-color: #357abd; }
        .btn-cancelar { background-color: #e74c3c; margin-right: 5px; }

        /* Tabela */
        .table-section {
            background: var(--card-color);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td { padding: 12px 15px; border-bottom: 1px solid #ddd; }
        th { background-color: #f8f9fa; color: #333; }

        /* Status de Cores e Tags de Texto */
        .status-hoje { background-color: #fff3cd !important; color: #856404; }
        .status-vencido { background-color: #f8d7da !important; color: #721c24; }
        .status-normal { background-color: #d4edda !important; color: #155724; }

        .badge {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
        }
        .badge-hoje { background-color: var(--hoje-color); color: white; }
        .badge-vencido { background-color: var(--vencido-color); color: white; }
        .badge-normal { background-color: var(--normal-color); color: white; }

        /* Botões de Ação */
        .actions-cell {
            display: flex;
            gap: 5px;
        }
        .btn-action {
            padding: 6px 10px;
            font-size: 0.85rem;
        }
        .btn-renovar { background-color: var(--normal-color); }
        .btn-renovar:hover { background-color: #27ae60; }
        .btn-editar { background-color: #f1c40f; color: #333; }
        .btn-editar:hover { background-color: #d4ac0d; }
        .btn-deletar { background-color: var(--vencido-color); }
        .btn-deletar:hover { background-color: #c0392b; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-area">
        <h1>Gerenciador de Assinaturas Pro</h1>
        <div class="backup-controls">
            <button class="btn-backup" onclick="exportarDados()">📤 Exportar Backup</button>
            <button class="btn-import" onclick="document.getElementById('input-file').click()">📥 Importar Backup</button>
            <input type="file" id="input-file" accept=".json" onchange="importarDados(event)">
        </div>
    </div>

    <div class="dashboard">
        <div class="card clientes-qtd">
            <h3>Qtd. de Clientes</h3>
            <p id="dash-qtd">0</p>
        </div>
        <div class="card receber">
            <h3>A Receber (Mês Atual)</h3>
            <p id="dash-receber">R$ 0,00</p>
        </div>
        <div class="card recebido">
            <h3>Já Recebido (Mês Atual)</h3>
            <p id="dash-recebido">R$ 0,00</p>
        </div>
        <div class="card">
            <h3>Total Geral</h3>
            <p id="dash-total">R$ 0,00</p>
        </div>
    </div>

    <div class="form-section">
        <h2 id="form-title">Cadastrar Novo Cliente</h2>
        <form id="cadastro-form" onsubmit="salvarCliente(event)">
            <input type="hidden" id="edit-id" value="">
            
            <div class="form-grid">
                <div class="form-group">
                    <label for="nome">Nome</label>
                    <input type="text" id="nome" required>
                </div>
                <div class="form-group">
                    <label for="usuario">Usuário</label>
                    <input type="text" id="usuario" required>
                </div>
                <div class="form-group">
                    <label for="whatsapp">WhatsApp</label>
                    <input type="tel" id="whatsapp" placeholder="(00) 00000-0000" required>
                </div>
                <div class="form-group">
                    <label for="valor">Valor (R$)</label>
                    <input type="number" id="valor" step="0.01" required>
                </div>
                <div class="form-group">
                    <label for="vencimento">Data de Vencimento</label>
                    <input type="date" id="vencimento" required>
                </div>
                <div>
                    <button type="button" id="btn-cancelar-edit" class="btn-cancelar" style="display: none;" onclick="cancelarEdicao()">Cancelar</button>
                    <button type="submit" class="btn-salvar" id="btn-submit-form">Salvar</button>
                </div>
            </div>
        </form>
    </div>

    <div class="table-section">
        <h2>Lista de Clientes (Ordenado por Vencimento)</h2>
        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Usuário</th>
                    <th>WhatsApp</th>
                    <th>Valor</th>
                    <th>Vencimento</th>
                    <th>Situação</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="tabela-clientes">
                </tbody>
        </table>
    </div>
</div>

<script>
    let clientes = JSON.parse(localStorage.getItem('clientes')) || [];

    // Função para salvar (Criação ou Edição)
    function salvarCliente(event) {
        event.preventDefault();

        const idHidden = document.getElementById('edit-id').value;
        const nome = document.getElementById('nome').value;
        const usuario = document.getElementById('usuario').value;
        const whatsapp = document.getElementById('whatsapp').value;
        const valor = parseFloat(document.getElementById('valor').value);
        const vencimento = document.getElementById('vencimento').value;

        if (idHidden) {
            // Modo Edição
            clientes = clientes.map(cliente => {
                if (cliente.id === parseInt(idHidden)) {
                    return { ...cliente, nome, usuario, whatsapp, valor, vencimento };
                }
                return cliente;
            });
            cancelarEdicao(); // Reseta o estado do form
        } else {
            // Modo Novo Cadastro
            const novoCliente = {
                id: Date.now(),
                nome,
                usuario,
                whatsapp,
                valor,
                vencimento,
                pagoNoMes: false
            };
            clientes.push(novoCliente);
        }

        atualizarStorageETela();
        document.getElementById('cadastro-form').reset();
    }

    // Preenche os campos do formulário para edição
    function editarCliente(id) {
        const cliente = clientes.find(c => c.id === id);
        if (!cliente) return;

        document.getElementById('edit-id').value = cliente.id;
        document.getElementById('nome').value = cliente.nome;
        document.getElementById('usuario').value = cliente.usuario;
        document.getElementById('whatsapp').value = cliente.whatsapp;
        document.getElementById('valor').value = cliente.valor;
        document.getElementById('vencimento').value = cliente.vencimento;

        document.getElementById('form-title').innerText = "✏️ Editando Cliente: " + cliente.nome;
        document.getElementById('btn-submit-form').innerText = "Atualizar";
        document.getElementById('btn-cancelar-edit').style.display = "inline-block";
        
        // Rola a página suavemente até o formulário
        document.getElementById('cadastro-form').scrollIntoView({ behavior: 'smooth' });
    }

    function cancelarEdicao() {
        document.getElementById('edit-id').value = "";
        document.getElementById('cadastro-form').reset();
        document.getElementById('form-title').innerText = "Cadastrar Novo Cliente";
        document.getElementById('btn-submit-form').innerText = "Salvar";
        document.getElementById('btn-cancelar-edit').style.display = "none";
    }

    // Renovação (+1 mês)
    function renovarCliente(id) {
        clientes = clientes.map(cliente => {
            if (cliente.id === id) {
                let dataAtual = new Date(cliente.vencimento + 'T00:00:00');
                dataAtual.setMonth(dataAtual.getMonth() + 1);
                
                let ano = dataAtual.getFullYear();
                let mes = String(dataAtual.getMonth() + 1).padStart(2, '0');
                let dia = String(dataAtual.getDate()).padStart(2, '0');
                
                return {
                    ...cliente,
                    vencimento: `${ano}-${mes}-${dia}`,
                    pagoNoMes: true
                };
            }
            return cliente;
        });

        atualizarStorageETela();
    }

    function deletarCliente(id) {
        if(confirm("Tem certeza que deseja excluir este cliente?")) {
            clientes = clientes.filter(cliente => cliente.id !== id);
            atualizarStorageETela();
        }
    }

    // EXPORTAR ARQUIVO JSON
    function exportarDados() {
        const dadosStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(clientes, null, 2));
        const downloadAnchor = document.createElement('a');
        downloadAnchor.setAttribute("href", dadosStr);
        downloadAnchor.setAttribute("download", `backup_clientes_${new Date().toISOString().split('T')[0]}.json`);
        document.body.appendChild(downloadAnchor);
        downloadAnchor.click();
        downloadAnchor.remove();
    }

    // IMPORTAR ARQUIVO JSON
    function importarDados(event) {
        const arquivo = event.target.files[0];
        if (!arquivo) return;

        const leitor = new FileReader();
        leitor.onload = function(e) {
            try {
                const dadosImportados = JSON.parse(e.target.result);
                if (Array.isArray(dadosImportados)) {
                    if (confirm("Deseja substituir a lista atual pelos dados do arquivo de backup?")) {
                        clientes = dadosImportados;
                        atualizarStorageETela();
                        alert("Backup restaurado com sucesso!");
                    }
                } else {
                    alert("Formato de arquivo inválido.");
                }
            } catch (erro) {
                alert("Erro ao ler o arquivo de backup.");
            }
        };
        leitor.readAsText(arquivo);
        document.getElementById('input-file').value = ""; // limpa o input
    }

    function atualizarStorageETela() {
        localStorage.setItem('clientes', JSON.stringify(clientes));
        renderizarTabela();
        calcularDashboard();
    }

    function formatarData(dataString) {
        const [ano, mes, dia] = dataString.split('-');
        return `${dia}/${mes}/${ano}`;
    }

    function formatarMoeda(valor) {
        return valor.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    function renderizarTabela() {
        const tbody = document.getElementById('tabela-clientes');
        tbody.innerHTML = '';

        const hoje = new Date();
        hoje.setHours(0,0,0,0);

        // ORDENAÇÃO: Vencimentos mais antigos/proximos (menores datas) ficam no topo.
        const clientesOrdenados = [...clientes].sort((a, b) => {
            return new Date(a.vencimento + 'T00:00:00') - new Date(b.vencimento + 'T00:00:00');
        });

        clientesOrdenados.forEach(cliente => {
            const dataVencimento = new Date(cliente.vencimento + 'T00:00:00');
            dataVencimento.setHours(0,0,0,0);

            let classeStatus = 'status-normal';
            let textoStatus = 'Em dia';
            let classeBadge = 'badge-normal';
            
            if (dataVencimento.getTime() === hoje.getTime()) {
                classeStatus = 'status-hoje';
                textoStatus = 'Vence Hoje';
                classeBadge = 'badge-hoje';
            } else if (dataVencimento < hoje) {
                classeStatus = 'status-vencido';
                textoStatus = 'Atrasado';
                classeBadge = 'badge-vencido';
            }

            const tr = document.createElement('tr');
            tr.className = classeStatus;

            tr.innerHTML = `
                <td><strong>${cliente.nome}</strong></td>
                <td>${cliente.usuario}</td>
                <td><a href="https://wa.me/${cliente.whatsapp.replace(/\D/g, '')}" target="_blank" style="color: inherit; font-weight: bold;">${cliente.whatsapp}</a></td>
                <td>${formatarMoeda(cliente.valor)}</td>
                <td>${formatarData(cliente.vencimento)}</td>
                <td><span class="badge ${classeBadge}">${textoStatus}</span></td>
                <td class="actions-cell">
                    <button class="btn-action btn-renovar" title="Renovar +1 Mês" onclick="renovarCliente(${cliente.id})">Renovar</button>
                    <button class="btn-action btn-editar" title="Editar dados" onclick="editarCliente(${cliente.id})">✏️</button>
                    <button class="btn-action btn-deletar" title="Excluir" onclick="deletarCliente(${cliente.id})">X</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    function calcularDashboard() {
        let totalGeral = 0;
        let totalRecebido = 0;
        let totalAReceber = 0;

        clientes.forEach(cliente => {
            totalGeral += cliente.valor;
            if (cliente.pagoNoMes) {
                totalRecebido += cliente.valor;
            } else {
                totalAReceber += cliente.valor;
            }
        });

        document.getElementById('dash-qtd').innerText = clientes.length;
        document.getElementById('dash-total').innerText = formatarMoeda(totalGeral);
        document.getElementById('dash-recebido').innerText = formatarMoeda(totalRecebido);
        document.getElementById('dash-receber').innerText = formatarMoeda(totalAReceber);
    }

    function checarResetMensal() {
        const hoje = new Date();
        const mesAnoAtual = `${hoje.getMonth()}-${hoje.getFullYear()}`;
        const ultimoReset = localStorage.getItem('ultimoResetMes');

        if (ultimoReset !== mesAnoAtual) {
            clientes = clientes.map(c => ({ ...c, pagoNoMes: false }));
            localStorage.setItem('ultimoResetMes', mesAnoAtual);
            localStorage.setItem('clientes', JSON.stringify(clientes));
        }
    }

    checarResetMensal();
    atualizarStorageETela();
</script>

</body>
</html>
